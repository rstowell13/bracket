

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>March Madness 2026</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#06080f;--surface:#0c1020;--card:#111827;--border:#1e293b;--border2:#2d3a4f;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--accent:#3b82f6;--accent2:#2563eb;--orange:#f97316;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--radius:10px;--radius-lg:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}

/* Layout */
.header{background:var(--surface);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.logo{font-size:18px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--orange),#ea580c);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.header-right{display:flex;align-items:center;gap:12px}
.container{max-width:1100px;margin:0 auto;padding:24px}
.page-title{font-size:22px;font-weight:800;letter-spacing:-.3px;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text3);margin-bottom:24px}

/* Buttons */
.btn{padding:9px 18px;border-radius:var(--radius);font-weight:600;font-size:13px;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px;color:#fff;font-family:inherit}
.btn-a{background:var(--accent)}.btn-a:hover{background:var(--accent2)}
.btn-g{background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--border)}.btn-g:hover{background:rgba(255,255,255,.1);color:var(--text)}
.btn-d{background:rgba(239,68,68,.15);color:var(--red)}.btn-d:hover{background:rgba(239,68,68,.25)}
.btn-o{background:var(--orange)}.btn-o:hover{background:#ea580c}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:8px}
.btn:disabled{opacity:.35;cursor:not-allowed}

/* Inputs */
.inp{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:var(--radius);font-size:13px;outline:none;width:100%;font-family:inherit;transition:border .15s}
.inp:focus{border-color:var(--accent);background:rgba(255,255,255,.06)}
.inp-sm{padding:7px 10px;font-size:12px;border-radius:8px}
select.inp{appearance:auto}
textarea.inp{resize:vertical;font-family:monospace;font-size:11px}
.label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}

/* Tabs */
.tabs{display:flex;gap:2px;background:rgba(255,255,255,.04);padding:3px;border-radius:var(--radius);margin-bottom:24px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none;background:transparent;color:var(--text3);font-family:inherit}
.tab:hover{color:var(--text)}
.tab.active{background:var(--accent);color:#fff;font-weight:600}

.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);transition:all .15s;font-family:inherit}
.pill:hover{border-color:var(--border2);color:var(--text)}
.pill.active{background:var(--orange);border-color:var(--orange);color:#fff}

/* Bracket */
.bracket-wrap{display:flex;gap:10px;overflow-x:auto;padding:12px 0}
.bracket-col{display:flex;flex-direction:column;justify-content:space-around;min-width:155px;flex-shrink:0}
.bracket-col-hdr{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:10px}
.matchup{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--card);margin:3px 0}
.tr{padding:7px 10px;display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;transition:all .12s;border-bottom:1px solid rgba(255,255,255,.04)}
.tr:last-child{border-bottom:none}
.tr:hover{background:rgba(255,255,255,.05)}
.tr.picked{background:rgba(59,130,246,.2);font-weight:600}
.tr.correct{background:rgba(34,197,94,.2);font-weight:600}
.tr.wrong{background:rgba(239,68,68,.15);opacity:.5;text-decoration:line-through}
.tr.elim{opacity:.35}
.tr.empty{opacity:.2;cursor:default;pointer-events:none}
.tr.ro{cursor:default}
.seed-b{background:rgba(255,255,255,.08);border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;min-width:20px;text-align:center;flex-shrink:0}
.pts-b{margin-left:auto;background:var(--orange);color:#fff;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;flex-shrink:0}
.tn{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}

/* Leaderboard */
.lb-row{display:grid;grid-template-columns:44px 1fr 72px 72px 72px;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.04);align-items:center;font-size:13px;transition:background .1s}
.lb-row:hover{background:rgba(255,255,255,.02)}
.lb-hdr{font-weight:600;color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.5px}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at top,rgba(59,130,246,.08),transparent 60%)}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:44px 36px;width:100%;max-width:420px;text-align:center}

/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px;margin-bottom:28px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center}
.stat-v{font-size:30px;font-weight:800;background:linear-gradient(135deg,var(--orange),#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-l{font-size:10px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}

/* Scoring */
.sc-row{display:grid;grid-template-columns:36px 1.2fr 1fr 46px 46px 46px 60px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);align-items:center;font-size:12px;gap:4px}
.sc-hdr{font-weight:700;color:var(--text3);font-size:10px;text-transform:uppercase}

/* Setup */
.setup-row{display:grid;grid-template-columns:28px 1fr 28px 28px 1fr;gap:6px;align-items:center;font-size:12px;margin-bottom:6px}
.vs-t{text-align:center;color:var(--text3);font-weight:700;font-size:10px}

/* Misc */
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.sync-dot.on{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.5)}
.sync-dot.off{background:var(--text3)}
.banner{padding:8px 20px;font-size:11px;text-align:center;font-weight:500;border-bottom:1px solid var(--border)}
.champ-box{text-align:center;padding:20px;background:linear-gradient(135deg,var(--orange),#ea580c);border-radius:var(--radius);font-weight:800}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-state-text{font-size:14px;margin-bottom:16px}

.group-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .15s}
.group-card:hover{border-color:var(--accent);background:rgba(59,130,246,.05)}
.group-card.active{border-color:var(--accent);background:rgba(59,130,246,.08)}
.group-card h4{font-weight:700;font-size:14px;margin-bottom:4px}
.group-card p{font-size:12px;color:var(--text3)}

.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.step-n{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;flex-shrink:0;margin-right:8px}
.flex{display:flex}.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}.fw{flex-wrap:wrap}.aic{align-items:center}.jcsb{justify-content:space-between}.fdc{flex-direction:column}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb24{margin-bottom:24px}
.w100{width:100%}
</style>
</head>

<script>

const FIREBASE_CONFIG={apiKey: "AIzaSyC2AIrVsyjhk4ofOvyODJn9EV5qVkMoqZg",

// ===========================
// BRACKET LOGIC
// ===========================
const REGIONS=['East','West','South','Midwest'];
const RNAMES=['','Round of 64','Round of 32','Sweet 16','Elite 8','Final Four','Championship'];
const RPTS=[0,1,2,4,8,16,32];
const R1S=[[1,16],[8,9],[5,12],[4,13],[6,11],[3,14],[7,10],[2,15]];
const FD={};
for(let r=0;r<4;r++)for(let g=0;g<4;g++)FD[32+r*4+g]=[r*8+g*2,r*8+g*2+1];
for(let r=0;r<4;r++)for(let g=0;g<2;g++)FD[48+r*2+g]=[32+r*4+g*2,32+r*4+g*2+1];
for(let r=0;r<4;r++)FD[56+r]=[48+r*2,48+r*2+1];
FD[60]=[56,57];FD[61]=[58,59];FD[62]=[60,61];

function sRound(s){if(s<32)return 1;if(s<48)return 2;if(s<56)return 3;if(s<60)return 4;if(s<62)return 5;return 6}
function regSlots(ri,rd){if(rd===1)return Array.from({length:8},(_,i)=>ri*8+i);if(rd===2)return Array.from({length:4},(_,i)=>32+ri*4+i);if(rd===3)return Array.from({length:2},(_,i)=>48+ri*2+i);if(rd===4)return[56+ri];return[]}
function getMatchup(slot,data,teams){
  if(slot<32){const ri=Math.floor(slot/8),gi=slot%8,[s1,s2]=R1S[gi],rg=REGIONS[ri];return[{n:teams[rg]?.[s1]||'',s:s1},{n:teams[rg]?.[s2]||'',s:s2}]}
  const[f1,f2]=FD[slot];return[{n:data[f1]||'',s:0},{n:data[f2]||'',s:0}];
}
function bldInfo(teams){const i={};for(const rg of REGIONS)for(let s=1;s<=16;s++)if(teams[rg]?.[s])i[teams[rg][s]]={seed:s,region:rg};return i}
function enrich(slot,data,teams,info){return getMatchup(slot,data,teams).map(t=>({n:t.n,s:info[t.n]?.seed||t.s,r:info[t.n]?.region||''}))}
function cascade(picks,slot,winner,teams){
  const np={...picks};np[slot]=winner;
  let ch=true;while(ch){ch=false;for(let s=32;s<63;s++){if(!np[s]||!FD[s])continue;const[f1,f2]=FD[s],t1=np[f1],t2=np[f2];if(t1!==undefined&&t1!==np[s]&&t2!==undefined&&t2!==np[s]){delete np[s];ch=true}}}
  return np;
}
function calcScores(picks,results,teams,info){
  const details=[];let total=0,correct=0;
  for(let s=0;s<63;s++){if(!results[s]||!picks[s]||picks[s]!==results[s])continue;correct++;const rd=sRound(s),base=RPTS[rd],m=enrich(s,results,teams,info);const winner=results[s],loser=m[0].n===winner?m[1]:m[0],wi=info[winner],li=info[loser.n];let mult=1,upset=false;if(wi&&li&&wi.seed>li.seed){upset=true;mult=wi.seed-li.seed}const pts=base*mult;total+=pts;details.push({slot:s,round:rd,team:winner,opp:loser.n,base,mult,upset,pts,ws:wi?.seed||0,ls:li?.seed||0})}
  return{total,correct,details};
}
function isElim(name,results,teams){for(let s=0;s<63;s++){if(!results[s])continue;const m=getMatchup(s,results,teams);if((m[0].n===name||m[1].n===name)&&results[s]!==name)return true}return false}
function countAlive(picks,results,teams){let alive=0,dead=0;for(let s=0;s<63;s++){if(!picks[s]||results[s])continue;if(isElim(picks[s],results,teams))dead++;else alive++}return{alive,dead}}

// ===========================
// DATA + FIREBASE
// ===========================
const SK='mm2026_v2';
const FB_OK=!!(FIREBASE_CONFIG.apiKey&&FIREBASE_CONFIG.https://bracket-challenge-b549f-default-rtdb.firebaseio.com/);
let fbRef=null,fbOn=false,saveT=null,renderQ=false;
function ls(st){try{localStorage.setItem(SK,JSON.stringify(st))}catch(e){}}
function ll(){try{const d=localStorage.getItem(SK);return d?JSON.parse(d):null}catch(e){return null}}
if(FB_OK){try{firebase.initializeApp(FIREBASE_CONFIG);fbRef=firebase.database().ref('mm2026');firebase.database().ref('.info/connected').on('value',s=>{fbOn=!!s.val();qr()});fbRef.on('value',s=>{const d=s.val();if(d){S=d;if(!S.picks)S.picks={};if(!S.results)S.results={};if(!S.groups)S.groups={};if(!S.users)S.users={};ls(S);qr()}})}catch(e){console.error(e)}}
function save(st){ls(st);if(FB_OK&&fbRef){clearTimeout(saveT);saveT=setTimeout(()=>fbRef.set(st).catch(e=>console.error(e)),250)}}
function qr(){if(renderQ)return;renderQ=true;requestAnimationFrame(()=>{renderQ=false;render()})}

const DTEAMS={East:{1:'Duke',2:'UConn',3:'Michigan St.',4:'Kansas',5:"St. John's",6:'Louisville',7:'UCLA',8:'Ohio St.',9:'TCU',10:'UCF',11:'South Florida',12:'N. Iowa',13:'Cal Baptist',14:'N. Dakota St.',15:'Furman',16:'Siena'},South:{1:'Florida',2:'Houston',3:'Illinois',4:'Nebraska',5:'Vanderbilt',6:'N. Carolina',7:"Saint Mary's",8:'Clemson',9:'Iowa',10:'Texas A&M',11:'VCU',12:'McNeese',13:'Troy',14:'Penn',15:'Idaho',16:'PVAM/LEH'},West:{1:'Arizona',2:'Purdue',3:'Gonzaga',4:'Arkansas',5:'Wisconsin',6:'BYU',7:'Miami',8:'Villanova',9:'Utah St.',10:'Missouri',11:'TEX/NCST',12:'High Point',13:'Hawaii',14:'Kennesaw St.',15:'Queens',16:'LIU'},Midwest:{1:'Michigan',2:'Iowa St.',3:'Virginia',4:'Alabama',5:'Texas Tech',6:'Tennessee',7:'Kentucky',8:'Georgia',9:'Saint Louis',10:'Santa Clara',11:'M-OH/SMU',12:'Akron',13:'Hofstra',14:'Wright St.',15:'Tennessee St.',16:'UMBC/HOW'}};

// State: { teams, users:{name:{password,groups:[gid]}}, groups:{gid:{name,admin}}, picks:{name:{...}}, results:{}, siteAdmin:'pw' }
let S=ll()||{teams:DTEAMS,users:{},groups:{},picks:{},results:{},siteAdmin:'madness2026'};
if(!S.groups)S.groups={};if(!S.users)S.users={};if(!S.picks)S.picks={};if(!S.results)S.results={};
if(S.teams&&Object.values(S.teams).every(r=>Object.keys(r).length===0))S.teams=DTEAMS;
// Migrate from old format
if(S.participants&&!S.users){S.participants.forEach(p=>{S.users[p.name]={password:p.password,groups:[]}});delete S.participants}

let CU=null; // current user {name,isSiteAdmin}
let V={page:'login',tab:'leaderboard',adminTab:'teams',region:'East',bv:'region',viewUser:'',editUser:'',copyFrom:'',group:'',groupTab:'members'};

// Helpers
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function groupMembers(gid){return Object.entries(S.users).filter(([n,u])=>u.groups&&u.groups.includes(gid)).map(([n])=>n)}
function isGroupAdmin(gid,name){return S.groups[gid]?.admin===name}
function userGroups(name){const u=S.users[name];return u?.groups?.map(g=>({id:g,...S.groups[g]})).filter(g=>g.name)||[]}
function colorFor(name){let h=0;for(let i=0;i<name.length;i++)h=name.charCodeAt(i)+((h<<5)-h);const hue=Math.abs(h)%360;return`hsl(${hue},55%,45%)`}

// ===========================
// DOM HELPERS
// ===========================
function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  if(attrs)for(const[k,v]of Object.entries(attrs)){
    if(k==='className')el.className=v;else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='value'&&(tag==='input'||tag==='select'||tag==='textarea'))el.value=v;
    else if(k==='selected')el.selected=v;else if(k==='disabled')el.disabled=v;
    else if(k==='type')el.type=v;else if(k==='placeholder')el.placeholder=v;
    else el.setAttribute(k,v);
  }
  for(const c of ch.flat()){if(c==null||c===false)continue;el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c)}
  return el;
}
function teamRow(team,sel,status,pts,onClick,ro){
  let cls='tr';if(!team?.n)cls+=' empty';else if(status==='correct')cls+=' correct';else if(status==='wrong')cls+=' wrong';else if(status==='elim')cls+=' elim';else if(sel)cls+=' picked';if(ro)cls+=' ro';
  const row=h('div',{className:cls});if(team?.s)row.appendChild(h('span',{className:'seed-b'},''+team.s));row.appendChild(h('span',{className:'tn'},team?.n||'TBD'));if(pts>0)row.appendChild(h('span',{className:'pts-b'},'+'+pts));if(onClick&&team?.n&&!ro)row.addEventListener('click',()=>onClick(team.n));return row;
}
function mkBracket(ri,data,teams,info,interactive,onPick,results,scoring,uPicks){
  return h('div',{className:'bracket-wrap'},...[1,2,3,4].map(rd=>{
    const slots=regSlots(ri,rd),col=h('div',{className:'bracket-col'});col.appendChild(h('div',{className:'bracket-col-hdr'},RNAMES[rd]));
    let sm={};if(scoring&&uPicks&&results){calcScores(uPicks,results,teams,info).details.forEach(d=>sm[d.slot]=d.pts)}
    for(const slot of slots){const m=enrich(slot,data,teams,info),w=data[slot]||'',mu=h('div',{className:'matchup'});
      for(let ti=0;ti<2;ti++){const t=m[ti];let st='';if(scoring&&results){if(results[slot]){if(data[slot]===t.n&&results[slot]===t.n)st='correct';else if(data[slot]===t.n&&results[slot]!==t.n)st='wrong'}else if(data[slot]===t.n&&t.n&&isElim(t.n,results,teams))st='elim'}
        mu.appendChild(teamRow(t,w===t.n,st,scoring&&st==='correct'?(sm[slot]||0):0,interactive?n=>onPick(slot,n):null,!interactive))}
      col.appendChild(mu)}return col}));
}
function mkFF(data,teams,info,interactive,onPick,results,scoring,uPicks){
  let sm={};if(scoring&&uPicks&&results){calcScores(uPicks,results,teams,info).details.forEach(d=>sm[d.slot]=d.pts)}
  function col(label,slots){const c=h('div',{className:'bracket-col'});c.appendChild(h('div',{className:'bracket-col-hdr'},label));
    for(const slot of slots){const m=enrich(slot,data,teams,info),w=data[slot]||'',mu=h('div',{className:'matchup'});
      for(let ti=0;ti<2;ti++){const t=m[ti];let st='';if(scoring&&results){if(results[slot]){if(data[slot]===t.n&&results[slot]===t.n)st='correct';else if(data[slot]===t.n&&results[slot]!==t.n)st='wrong'}else if(data[slot]===t.n&&t.n&&isElim(t.n,results,teams))st='elim'}
        mu.appendChild(teamRow(t,w===t.n,st,scoring&&st==='correct'?(sm[slot]||0):0,interactive?n=>onPick(slot,n):null,!interactive))}
      c.appendChild(mu)}return c}
  const wr=h('div',{className:'bracket-wrap',style:{minHeight:'200px'}},col('Final Four',[60,61]),col('Championship',[62]));
  if(data[62])wr.appendChild(h('div',{className:'bracket-col'},h('div',{className:'bracket-col-hdr'},'Champion'),h('div',{className:'champ-box'},'\u{1F3C6} '+data[62])));
  return wr;
}
function regionPills(onSelect){
  const d=h('div',{className:'pills mb12'});REGIONS.forEach(r=>d.appendChild(h('button',{className:'pill'+(V.bv==='region'&&V.region===r?' active':''),onClick:()=>{V.region=r;V.bv='region';onSelect()}},r)));
  d.appendChild(h('button',{className:'pill'+(V.bv==='ff'?' active':''),onClick:()=>{V.bv='ff';onSelect()}},'Final Four'));return d;
}
function avatar(name){return h('div',{className:'avatar',style:{background:colorFor(name)}},name.charAt(0).toUpperCase())}

// ===========================
// LOGIN
// ===========================
function renderLogin(){
  let mode='login',err='',nm='',pw='',regName='',regPw='',regPw2='';
  function draw(){
    const root=document.getElementById('app');root.innerHTML='';
    const card=h('div',{className:'login-card'});

  f.appendChild(h('div',{className:'flex gap12 mb24'},
    h('button',{className:'btn btn-a',onClick:()=>{const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='bracket-data.json';a.click();URL.revokeObjectURL(u)}},'Export JSON'),
    (()=>{const fi=h('input',{type:'file',style:{display:'none'},onChange:e=>{const file=e.target.files?.[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{S=JSON.parse(ev.target.result);save(S);render()}catch(er){alert('Invalid file')}};r.readAsText(file)}});return h('div',null,h('button',{className:'btn btn-g',onClick:()=>fi.click()},'Import JSON'),fi)})()
  ));
  const filled=Object.values(S.teams).reduce((a,r)=>a+Object.values(r).filter(Boolean).length,0);
  f.appendChild(h('div',{style:{padding:'16px',background:'var(--surface)',borderRadius:'var(--radius)',fontSize:'13px',color:'var(--text3)',lineHeight:'1.8'}},
    h('strong',{style:{color:'var(--text)'}},'Data Summary'),h('br'),
    'Teams: '+filled+'/64',h('br'),
    'Users: '+Object.keys(S.users).length,h('br'),
    'Groups: '+Object.keys(S.groups).length,h('br'),
    'Brackets complete: '+Object.keys(S.users).filter(n=>Object.keys(S.picks[n]||{}).length===63).length,h('br'),
    'Games decided: '+Object.keys(S.results).length+'/63'
  ));
  return f;
}

// ===========================
// MAIN
// ===========================
function render(){if(V.page==='login'||!CU)renderLogin();else renderDash()}
if(FB_OK&&fbRef){fbRef.once('value',s=>{if(!s.val())fbRef.set(S)})}
render();
</script>
</body>
